on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Install dependencies
      uses: actions/setup-node@v2
      with:
        node-version: '14'  

    - name: 📂 Install npm dependencies
      run: npm install
    
    - name: 📂 Sync files
      uses: burnett01/rsync-deployments@7.0.1
      with:
        switches: -avzr --delete --exclude='.git*' --exclude='node_modules/' --exclude='node_modules/bootstrap/scss/' --exclude='node_modules/bootstrap/js/' --exclude='node_modules/bootstrap-icons/icons/'
        path: ./
        remote_path: /home/quaiantique-resto/www/
        remote_host: ssh-quaiantique-resto.alwaysdata.net
        remote_user: quaiantique-resto
        remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
